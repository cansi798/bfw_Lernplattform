    a: 1, e: "Recht (LkSG/CSRD), Markt und gesellschaftliche Erwartung machen Nachhaltigkeit heute zur Pflicht." }
];

let answers = new Array(QUESTIONS.length).fill(null);
let viewMode = 'list';      // 'list' oder 'slide'
let evalMode = 'immediate'; // 'immediate' oder 'end'
let currentSlide = 0;

// IHK-Notenschlüssel (offiziell, AbschlussPrüfungen kaufmännischer Berufe)
function ihkNote(pct) {
  if (pct >= 92) return { num: 1, name: 'sehr gut',     color: '#10B981', bestanden: true };
  if (pct >= 81) return { num: 2, name: 'gut',          color: '#0EA5A4', bestanden: true };
  if (pct >= 67) return { num: 3, name: 'befriedigend', color: '#0EA5A4', bestanden: true };
  if (pct >= 50) return { num: 4, name: 'ausreichend',  color: '#F59E0B', bestanden: true };
  if (pct >= 30) return { num: 5, name: 'mangelhaft',   color: '#F97316', bestanden: false };
  return                         { num: 6, name: 'ungenügend',   color: '#EF4444', bestanden: false };
}

function setView(mode) {
  viewMode = mode;
  document.getElementById('modeList').classList.toggle('btn-primary', mode === 'list');
  document.getElementById('modeList').classList.toggle('btn-ghost',   mode !== 'list');
  document.getElementById('modeSlide').classList.toggle('btn-primary', mode === 'slide');
  document.getElementById('modeSlide').classList.toggle('btn-ghost',   mode !== 'slide');
  document.getElementById('slideNav').style.display = (mode === 'slide') ? 'block' : 'none';
  applyView();
}

function setEval(mode) {
  evalMode = mode;
  document.getElementById('modeImmediate').classList.toggle('btn-primary', mode === 'immediate');
  document.getElementById('modeImmediate').classList.toggle('btn-ghost',   mode !== 'immediate');
  document.getElementById('modeEnd').classList.toggle('btn-primary', mode === 'end');
  document.getElementById('modeEnd').classList.toggle('btn-ghost',   mode !== 'end');
}

function applyView() {
  const allQ = document.querySelectorAll('.question');
  if (viewMode === 'list') {
    allQ.forEach(q => q.style.display = '');
  } else {
    allQ.forEach((q, i) => q.style.display = (i === currentSlide ? '' : 'none'));
    document.getElementById('slidePos').textContent = currentSlide + 1;
    document.getElementById('slideTotal').textContent = QUESTIONS.length;
  }
}

function nextSlide() {
  if (currentSlide < QUESTIONS.length - 1) { currentSlide++; applyView(); window.scrollTo(0, 0); }
}
function prevSlide() {
  if (currentSlide > 0) { currentSlide--; applyView(); window.scrollTo(0, 0); }
}

function renderQuiz() {
  const root = document.getElementById('quiz');
  root.innerHTML = '';
  document.getElementById('total').textContent = QUESTIONS.length;
  QUESTIONS.forEach((qd, i) => {
    const q = document.createElement('div');
    q.className = 'question';
    q.id = `q-${i}`;
    let html = `
      <span class="q-num">Frage ${i + 1}</span>
      <span class="q-topic">${qd.topic}</span>
      <p class="q-text">${qd.q}</p>
      <div class="options">
    `;
    qd.options.forEach((opt, j) => {
      const letter = String.fromCharCode(65 + j);
      html += `<div class="option" data-q="${i}" data-opt="${j}" onclick="answer(${i}, ${j})">
        <div class="marker">${letter}</div>
        <div>${opt}</div>
      </div>`;
    });
    html += '</div>';
    q.innerHTML = html;
    root.appendChild(q);
  });
  applyView();
  updateScore();
}

function answer(qi, oi) {
  if (answers[qi] !== null) return;
  answers[qi] = oi;
  const q = document.getElementById(`q-${qi}`);
  const opts = q.querySelectorAll('.option');
  opts.forEach(o => o.classList.add('locked'));

  if (evalMode === 'immediate') {
    // Sofort markieren und Erklärung zeigen
    const correct = QUESTIONS[qi].a;
    opts[oi].classList.add(oi === correct ? 'correct' : 'incorrect');
    if (oi !== correct) opts[correct].classList.add('correct');
    const exp = document.createElement('div');
    exp.className = 'explanation';
    exp.textContent = QUESTIONS[qi].e;
    q.appendChild(exp);
    q.classList.add('locked');
  } else {
    // Nur „angekreuzt"-Status, keine Bewertung anzeigen
    opts[oi].style.borderColor = 'var(--bfw-primary)';
    opts[oi].style.background = 'var(--bfw-bg-teal)';
    opts[oi].querySelector('.marker').style.background = 'var(--bfw-primary)';
    opts[oi].querySelector('.marker').style.color = 'white';
    opts[oi].querySelector('.marker').style.borderColor = 'var(--bfw-primary)';
  }
  updateScore();
}

function updateScore() {
  const answered = answers.filter(a => a !== null).length;
  document.getElementById('answered').textContent = answered;
  document.getElementById('progressBar').style.width = `${(answered / QUESTIONS.length) * 100}%`;
  if (evalMode === 'immediate') {
    const correct = answers.filter((a, i) => a === QUESTIONS[i].a).length;
    document.getElementById('correct').textContent = correct;
  } else {
    document.getElementById('correct').textContent = '—';
  }
  if (answered === QUESTIONS.length && evalMode === 'immediate') showSummary();
}

function finishNow() {
  // Im End-Modus: alle bislang nicht beantworteten Fragen werden als „nicht beantwortet" gewertet
  // und alle Lösungen+Erklärungen werden offengelegt.
  for (let i = 0; i < QUESTIONS.length; i++) {
    const q = document.getElementById(`q-${i}`);
    if (!q) continue;
    const opts = q.querySelectorAll('.option');
    opts.forEach(o => o.classList.add('locked'));
    const correct = QUESTIONS[i].a;
    if (answers[i] !== null) {
      opts[answers[i]].classList.add(answers[i] === correct ? 'correct' : 'incorrect');
      if (answers[i] !== correct) opts[correct].classList.add('correct');
    } else {
      opts[correct].classList.add('correct');
    }
    if (!q.querySelector('.explanation')) {
      const exp = document.createElement('div');
      exp.className = 'explanation';
      exp.textContent = QUESTIONS[i].e;
      q.appendChild(exp);
    }
    q.classList.add('locked');
  }
  // Im Slide-Modus: zur Übersicht wechseln
  setView('list');
  showSummary();
}

function showSummary() {
  const total = QUESTIONS.length;
  const correct = answers.filter((a, i) => a === QUESTIONS[i].a).length;
  const answered = answers.filter(a => a !== null).length;
  const pct = Math.round((correct / total) * 100);
  const note = ihkNote(pct);

  // IHK-Skala-Tabelle
  const skala = [
    { stufe: 1, label: 'sehr gut',     range: '92 – 100 %', col: '#10B981' },
    { stufe: 2, label: 'gut',          range: '81 – 91 %',  col: '#0EA5A4' },
    { stufe: 3, label: 'befriedigend', range: '67 – 80 %',  col: '#0EA5A4' },
    { stufe: 4, label: 'ausreichend',  range: '50 – 66 %',  col: '#F59E0B' },
    { stufe: 5, label: 'mangelhaft',   range: '30 – 49 %',  col: '#F97316' },
    { stufe: 6, label: 'ungenügend',   range: '0 – 29 %',   col: '#EF4444' }
  ];

  const skalaRows = skala.map(s => `
    <tr style="${s.stufe === note.num ? 'background: var(--bfw-bg-teal); font-weight: 700;' : ''}">
      <td style="color: ${s.col}; font-weight: 700;">${s.stufe}</td>
      <td>${s.label}</td>
      <td>${s.range}</td>
    </tr>`).join('');

  const s = document.getElementById('summary');
  s.style.display = 'block';
  s.innerHTML = `
    <div class="summary">
      <h2>Quiz ausgewertet</h2>
      <div class="big-score" style="color: ${note.color};">${note.num}</div>
      <div class="grade"><strong>${note.name}</strong> · ${correct} von ${total} richtig (${pct} %)</div>
      <div style="margin-top: 0.5rem; color: ${note.bestanden ? 'var(--bfw-success)' : 'var(--bfw-danger)'}; font-weight: 600;">
        ${note.bestanden ? '✓ bestanden' : '✗ nicht bestanden'}
      </div>
      ${answered < total ? `<div style="margin-top: 0.6rem; color: var(--bfw-warn); font-size: 0.95rem;">${total - answered} Fragen unbeantwortet — als falsch gewertet.</div>` : ''}

      <div style="margin: 1.6rem auto 0; max-width: 360px;">
        <table style="font-size: 0.9rem;">
          <thead><tr><th>Note</th><th>Beurteilung</th><th>Punktebereich</th></tr></thead>
          <tbody>${skalaRows}</tbody>
        </table>
        <p style="font-size: 0.78rem; color: var(--bfw-ink-soft); margin-top: 0.4rem;">
          IHK-Notenschlüssel (kaufmännische Abschlussprüfungen)
        </p>
      </div>

      <div style="margin-top: 1.5rem;">
        <button class="btn btn-primary" onclick="resetQuiz()">Neu starten</button>
        <button class="btn btn-ghost" onclick="window.print()" style="margin-left: 0.5rem;">Drucken / als PDF speichern</button>
      </div>
    </div>
  `;
  s.scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
  answers = new Array(QUESTIONS.length).fill(null);
  currentSlide = 0;
  document.getElementById('summary').style.display = 'none';
  document.getElementById('summary').innerHTML = '';
  renderQuiz();
  window.scrollTo(0, 0);
}

// Initial: Buttons-Default-Status setzen
setView('list');
setEval('immediate');
renderQuiz();
</script>
